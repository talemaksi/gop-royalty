<!DOCTYPE html>
<html>
<head>
    <title>GOP-ROYALTY</title>
    <style>
        .photo-container {
    position: relative;
    margin: 50px 0;
    display: inline-block;
}

.glitch-img {
    width: 80vw; /* Фото будет на 80% ширины экрана */
    max-width: 600px;
    filter: contrast(120%) grayscale(20%); /* Добавляем драматизма */
    border: 10px solid #fff;
    transform: rotate(-2deg); /* Тот самый наклон "наклеено на стену" */
    box-shadow: 15px 15px 0px #ff0000; /* Агрессивная красная тень */
}

.caption {
    background: #fff;
    color: #000;
    font-size: 1.2rem;
    padding: 5px 10px;
    position: absolute;
    bottom: -20px;
    right: -10px;
    transform: rotate(3deg);
}
    </style>
</head>
<body>
    <div class="stripe"></div>
    <div class="stripe" style="top: 170px; transform: rotate(1deg);"></div>
    
    <h1>GOP<br>ROYALTY</h1>
    
    <div class="manifesto">
     "From the palace to the pavement. From the ballroom to the brawl."
     Silk lace meets tracksuit synthetic.
    </div>
    <div class="photo-container">
    <img src="hero.jpg" alt="Victorian Gopcore Look" class="glitch-img">
    <div class="caption">LOOK 01: THE COURTSIDE DUCHESS</div>
</div>

</body>
</html>
