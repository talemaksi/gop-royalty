<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GOP-ROYALTY // ISSUE 01</title>
    <style>
        /* Глобальные стили: эффект старой бумаги и зерна */
        body {
            background-color: #f0f0f0; /* Светло-серый, как газетная бумага */
            color: #000;
            font-family: 'Arial Black', sans-serif;
            margin: 0;
            padding: 0;
            line-height: 0.9;
        }

        /* Эффект зернистости поверх всего сайта */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url(https://vercel.app);
            opacity: 0.15;
            pointer-events: none;
            z-index: 9999;
        }

        /* Шапка журнала */
        header {
            padding: 20px;
            border-bottom: 5px solid #000;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            position: sticky;
            top: 0;
            background: #f0f0f0;
            z-index: 100;
        }

        header h1 { font-size: 3rem; margin: 0; text-transform: uppercase; }
        header span { font-size: 1rem; border: 2px solid #000; padding: 5px; }

        /* Сетка лукбука */
        .magazine-grid {
            display: grid;
            grid-template-columns: repeat(12, 1fr);
            gap: 10px;
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Общий стиль для всех блоков с фото */
        .look {
            position: relative;
            background: #000;
            overflow: hidden;
            filter: grayscale(100%) contrast(120%);
            transition: 0.4s;
        }

        .look:hover {
            filter: grayscale(0%) contrast(100%);
            z-index: 50;
        }

        .look img { width: 100%; display: block; object-fit: cover; }

        /* Позиционирование элементов (Хаос) */
        .item-1 { grid-column: 1 / 7; grid-row: 1 / 4; transform: rotate(-1deg); }
        .item-2 { grid-column: 7 / 13; grid-row: 2 / 5; transform: rotate(2deg); margin-top: 50px; }
        .item-3 { grid-column: 2 / 6; grid-row: 5 / 8; transform: rotate(-2deg); z-index: 10; }
        .item-4 { grid-column: 6 / 12; grid-row: 6 / 9; }

        /* Текстовые вставки (подписи) */
        .text-block {
            grid-column: 8 / 12;
            grid-row: 1 / 2;
            font-size: 1.2rem;
            text-transform: uppercase;
            padding: 10px;
            border-top: 3px solid #000;
        }

        .caption {
            position: absolute;
            background: #000;
            color: #fff;
            padding: 5px 10px;
            font-size: 0.8rem;
            bottom: 10px;
            right: 10px;
        }

        /* Подвал */
        footer {
            text-align: center;
            padding: 100px 20px;
            font-size: 5vw;
            background: #000;
            color: #fff;
            margin-top: 50px;
        }
    </style>
</head>
<body>

<header>
    <h1>Gop-Royalty</h1>
    <span>ISSUE 01 / 2024</span>
</header>

<main class="magazine-grid">
    <div class="text-block">
        Victoria meets the street. <br>
        Three stripes on the corset. <br>
        Vandalism in high places.
    </div>

    <!-- Твое главное фото -->
    <div class="look item-1">
        <img src="hero.jpg" alt="Look 1">
        <div class="caption">MOD. 01 / THE DUCHESS</div>
    </div>

    <!-- Место для второго фото -->
    <div class="look item-2">
        <img src="https://placeholder.com" alt="Look 2">
        <div class="caption">MOD. 02 / NYLON LACE</div>
    </div>

    <!-- Место для третьего фото -->
    <div class="look item-3">
        <img src="https://placeholder.com" alt="Look 3">
        <div class="caption">MOD. 03 / TRACK-CROWN</div>
    </div>

    <!-- Место для четвертого фото -->
    <div class="look item-4">
        <img src="https://placeholder.com" alt="Look 4">
        <div class="caption">MOD. 04 / PAVEMENT ROYALTY</div>
    </div>
</main>

<footer>
    ADIDAS ABOMINATION
</footer>

</body>
</html>
